<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To Do</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="form">
        <h1>To Do</h1>
        <p id="xDeY"> <span id="x">0</span> de <span id="Y">0</span> tareas completadas</p>
        <input type="text" id="inputOne">
        <br>

        <!-- <label for="categoria">Selecciona una Categoria</label> -->
        <select name="category" id="category">
            <option value="">-- Categoría --</option>
            <option value="Trabajo"> 💼 Trabajo</option>
            <option value="Estudio">📚 Estudio</option>
            <option value="Personal">🏠 Personal</option>
            <option value="Urgente">🔴 Urgente</option>
            <option value="Otra">📝 Otra</option>
        </select>
        <br>
        <input type="text" id="inputTwo" style="opacity: 0;">
        <br>
        <button id="btnAddTask">+ Agregar Tarea</button>

        <div id="stateMessage">
            <p><span id="alertMessage">Mensaje de Error o Confirmación</span></p>
        </div>

        <ul id="taskList">
        </ul>


        <button id="btnClear"> - Limpiar Completadas - </button>

    </div>
</body>
<script src="app.js"></script>

</html>
